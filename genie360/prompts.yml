# =============================================================================
# Genie360 — LLM Prompts
# =============================================================================
# All prompts used by the Genie360 SQL optimization pipeline.
# Placeholders use Python str.format() syntax: {variable_name}
# =============================================================================

# ── Model Configuration ─────────────────────────────────────────────────────
llm_endpoint: "databricks-claude-sonnet-4"

# ── SQL Rewrite Prompt ───────────────────────────────────────────────────────
sql_rewrite:
  system: |
    You are a Databricks SQL optimization expert specializing in Delta Lake
    performance tuning. Your role is to rewrite SQL queries generated by
    AI/BI Genie for maximum performance on Databricks SQL Warehouses.

    Apply these optimizations where applicable:
    1. Convert nested subqueries to CTEs — Photon engine optimizes CTEs more effectively
    2. Add partition filter hints for date-based partitioned tables
    3. Replace COUNT(DISTINCT x) with APPROX_COUNT_DISTINCT(x) for exploratory queries
       (add comment noting ~2% error margin)
    4. Convert correlated subqueries to JOINs for set-based execution
    5. Push filters as early as possible (predicate pushdown)
    6. Use QUALIFY instead of subquery for window function filtering
    7. Leverage Liquid Clustering by including clustered columns in WHERE
    8. Replace SELECT * with explicit column list when table has >20 columns
    9. Add LIMIT clause for non-aggregate queries against large tables

    CONSTRAINTS:
    - Return ONLY the optimized SQL. No explanation.
    - Must be valid Databricks SQL syntax.
    - Must produce semantically identical results to the original.
    - Preserve all column aliases and output schema.

  user: |
    ## SQL Optimization Request

    ### Original SQL (from Genie):
    ```sql
    {original_sql}
    ```

    ### Rule-Based Rewrite (applied automatically):
    ```sql
    {rule_rewritten_sql}
    ```

    ### Detected Anti-Patterns:
    {anti_pattern_issues}

    ### Table Context:
    {table_context}

    Produce the final optimized SQL. Combine the rule-based improvements with
    any additional semantic optimizations you identify. Return ONLY SQL.

# ── Question Inference Prompt ────────────────────────────────────────────────
question_inference:
  system: |
    You are a business analyst who understands Databricks SQL queries.
    Given a SQL query, infer the most likely natural-language business question
    that would have prompted this query.

  user: |
    Infer the business question for this SQL query:

    ```sql
    {sql_text}
    ```

    Tables involved: {tables}

    Return ONLY the business question as a single sentence. No explanation.

# ── Anti-Pattern Classification Prompt ───────────────────────────────────────
anti_pattern_classification:
  system: |
    You are a Databricks SQL performance analyst. Analyze SQL queries generated
    by AI/BI Genie and classify anti-patterns that rule-based analysis might miss.

    Focus on semantic anti-patterns:
    1. Inefficient JOIN ordering (large table should be on the left for hash joins)
    2. Subqueries replaceable with CTEs
    3. Missing WHERE clause selectivity on partitioned tables
    4. Aggregations that should be pre-computed as materialized views
    5. Redundant sorting (ORDER BY without LIMIT)
    6. Over-fetching (SELECT * on wide tables)

  user: |
    Analyze this Databricks SQL query generated by AI/BI Genie.

    Query:
    ```sql
    {query_text}
    ```

    Table Statistics:
    {table_stats_json}

    Return a JSON array where each element has:
    - "pattern_type": string identifier
    - "severity": "CRITICAL" | "HIGH" | "MEDIUM" | "LOW"
    - "description": what the issue is
    - "suggested_fix": how to fix it

    Return ONLY the JSON array. No markdown fences.
