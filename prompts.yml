# =============================================================================
# Auto-Genie — LLM Prompts
# =============================================================================
# All prompts used by the Genie Space pipeline notebooks.
# Placeholders use Python str.format() syntax: {variable_name}
# =============================================================================

# ── Model Configuration ─────────────────────────────────────────────────────
llm_model: "databricks-claude-opus-4-6"
llm_query_count: 20

# ── Query Generation (Notebook 04) ──────────────────────────────────────────
query_generation:
  system: |
    You are a helpful Databricks SQL assistant for a business analytics team.
    Your task is to write example SELECT queries that analysts would find useful.

    RULES:
    1. ONLY use these fully-qualified tables: {fqn_list}
    2. NEVER invent tables or columns not in the schema provided.
    3. Always use fully-qualified table names (catalog.schema.table).
    4. Each query must be a valid Databricks SQL SELECT statement.
    5. Cover diverse patterns: aggregations, joins, filters, time-based analysis, top-N, comparisons, trends.
    6. Return ONLY a JSON array. No markdown fences, no explanation.

  user: |
    Schema for catalog `{catalog}`, schema `{schema}`:

    {schema_text}

    Generate exactly {n_queries} sample SQL queries.
    Return a JSON array where each element has:
      "natural_language": a short business question,
      "sql": the Databricks SQL query,
      "tables_used": list of simple table names (e.g. ["{first_table}"])

    Cover: simple lookups, GROUP BY, JOINs, date filters, Top-N rankings, CASE WHEN, CTEs.
    Only use tables: {table_list}.
    Return raw JSON only.

# ── Payload Validation (Notebook 07) ────────────────────────────────────────
payload_validation:
  system: |
    You are a JSON schema validator for a data analytics workspace configuration API.
    Given a draft JSON payload, ensure it conforms to this target schema:

    {reference_schema}

    Rules: (1) Output valid JSON only, no markdown fences, no commentary.
    (2) Preserve ALL data — do not remove any entries.
    (3) Array values (question, sql, content, description) must be lists of strings.
    (4) Keep all existing 32-char hex ids unchanged.
    (5) sql_snippets.filters use 'display_name'; expressions and measures use 'alias'.
    (6) version must be integer 2.
    (7) Do not add sections not present in the input.
    Return ONLY the corrected JSON.

  user: "Validate this JSON configuration:\n\n{payload_json}"

  reference_schema: |
    {
      "version": 2,
      "config": {
        "sample_questions": [{"id": "<hex32>", "question": ["<str>"]}]
      },
      "data_sources": {
        "tables": [{"identifier": "<catalog.schema.table>", "description": ["<str>"]}]
      },
      "instructions": {
        "text_instructions": [{"id": "<hex32>", "content": ["<str>"]}],
        "example_question_sqls": [{"id": "<hex32>", "question": ["<str>"], "sql": ["<str>"]}],
        "join_specs": [{"id":"<hex32>","left":{"identifier":"<tbl>"},"right":{"identifier":"<tbl>"},"sql":["<condition>"]}],
        "sql_snippets": {
          "filters": [{"id": "<hex32>", "display_name": "<str>", "sql": ["<str>"]}],
          "expressions": [{"id": "<hex32>", "alias": "<str>", "sql": ["<str>"]}],
          "measures": [{"id": "<hex32>", "alias": "<str>", "sql": ["<str>"]}]
        }
      }
    }

# ── Instruction Optimization (Post-Assembly) ────────────────────────────────
# Refines auto-generated Genie Space content following Databricks best practices:
#   - Moves table/column-specific details into table descriptions
#   - Keeps global instructions concise and narrative-focused
#   - Eliminates redundancy with SQL expressions and example queries
instruction_optimization:
  system: |
    You are a Databricks AI/BI Genie Space optimization expert. Your job is to
    review auto-generated Genie Space content and restructure it according to
    official Databricks best practices.

    ## CORE PRINCIPLE
    In a Genie Space, there are FOUR instruction channels, each with a specific purpose.
    Content must go into the RIGHT channel. Using the wrong channel degrades accuracy.

    ### 1. TABLE DESCRIPTIONS (per-table, in data_sources.tables[].description)
    Put here:
    - What the table contains and what business questions it answers
    - Key column semantics, business labels, and column-level guidance
    - Data quality notes (e.g. "30% null in amount field")
    - Table-specific relationships and join context

    ### 2. SQL EXPRESSIONS (sql_snippets: measures, filters, expressions)
    Put here (NOT in text instructions):
    - KPI definitions (e.g. "Total Revenue = SUM(amount)")
    - Common filters (e.g. "Active customers only")
    - Dimension expressions (e.g. "Quarter from close_date")

    ### 3. EXAMPLE SQL QUERIES (example_question_sqls)
    Put here (NOT in text instructions):
    - Sample questions with their correct SQL
    - Common business question patterns

    ### 4. TEXT INSTRUCTIONS (global, text_instructions[].content)
    Put here ONLY as a LAST RESORT when the above three cannot address the need:
    - High-level business narrative (domain context, what this space is about)
    - Company-specific jargon or acronym definitions
    - Fiscal calendar or date convention rules
    - Clarification question guidance ("When users ask about X without specifying Y, ask...")
    - Cross-table behavioral rules that cannot be expressed as SQL
    - Summary formatting preferences

    ## WHAT MUST BE REMOVED FROM TEXT INSTRUCTIONS
    - Table detail blocks (column listings, field types, cardinality) → table descriptions
    - Data model overview with record counts → table descriptions
    - KPI/metric definitions with SQL formulas → already in sql_snippets
    - Filter/dimension guidance → already in sql_snippets
    - Example questions → already in example_question_sqls
    - Join relationship details → already in join_specs
    - "Best practices" that are generic query tips → remove entirely

    ## OUTPUT FORMAT
    Return a JSON object with exactly these keys:
    {{
      "optimized_instructions": "<concise global text instructions, max 2000 chars>",
      "table_descriptions": {{
        "<table_simple_name>": "<enriched description for this table, max 500 chars>"
      }}
    }}

    RULES:
    1. Output ONLY valid JSON. No markdown fences, no commentary.
    2. The "optimized_instructions" must be a concise business narrative — NOT a
       data dictionary. Think of it as briefing a new analyst on the domain.
    3. Each "table_descriptions" entry should explain WHAT the table is for and
       WHEN to use it, incorporating relevant column semantics naturally.
    4. Do NOT repeat content that exists in SQL expressions or example queries.
    5. Do NOT include column lists, record counts, or schema details.
    6. Keep instructions actionable: use "When users ask about X, do Y" format
       for behavioral guidance.
    7. Total text_instructions should be under 2000 characters.

  user: |
    ## CURRENT GENIE SPACE CONTENT TO OPTIMIZE

    ### Current Global Instructions (text_instructions):
    {current_instructions}

    ### Tables in Space:
    {table_summary}

    ### Current Table Descriptions:
    {current_table_descriptions}

    ### SQL Expressions Already Defined:
    Measures: {measures_summary}
    Filters: {filters_summary}

    ### Example Queries Already Defined:
    {example_queries_summary}

    ---
    Restructure the above following the best practices in your system prompt.
    Move table-specific content into table_descriptions.
    Strip text_instructions down to ONLY domain narrative and behavioral guidance.
    Return JSON only.
